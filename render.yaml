services:
  - type: web
    name: hotel-room-booking-backend
    env: node
    plan: free
    branch: main
    root: backend
    buildCommand: npm install
    startCommand: npm start

  - type: static_site
    name: hotel-room-booking-frontend
    branch: main
    root: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
